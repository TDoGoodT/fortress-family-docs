site_name: Fortress Family
site_description: Household data library — ingests documents, extracts structured data, serves intelligent agents
site_url: https://tdogoodt.github.io/fortress-family-docs
repo_url: https://github.com/Segway16/fortress-family
repo_name: Segway16/fortress-family
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Architecture:
    - Overview: architecture/overview.md
    - Design Decisions: architecture/design-decisions.md
  - Features: features.md
  - Setup & Deployment:
    - Setup: setup.md
    - Deployment Checklist: deployment-checklist.md
    - Staging Checklist: a1-staging-checklist.md
  - Roadmap:
    - Backlog: roadmap/backlog.md
    - Future Roadmap: roadmap/future-roadmap.md
    - Product Roadmap: roadmap/product-roadmap.md
  - Internal:
    - Briefing: internal/briefing.md
    - Integration Proposal: internal/integration-proposal.md
    - Document Cabinet: internal/document-cabinet.md
