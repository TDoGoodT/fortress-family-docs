version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: fortress-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fortress
      POSTGRES_USER: fortress
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fortress_dev}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - fortress_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fortress"]
      interval: 10s
      timeout: 5s
      retries: 5

  fortress:
    build: .
    container_name: fortress-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://fortress:${DB_PASSWORD:-fortress_dev}@db:5432/fortress
      STORAGE_PATH: /data/documents
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WAHA_API_URL: http://waha:3000
      WAHA_API_KEY: ${WAHA_API_KEY:-}
      ADMIN_PHONE: ${ADMIN_PHONE:-972542364393}
      OLLAMA_API_URL: http://ollama:11434
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      BEDROCK_HAIKU_MODEL: ${BEDROCK_HAIKU_MODEL:-anthropic.claude-3-5-haiku-20241022-v1:0}
      BEDROCK_HAIKU_PROFILE_ARN: ${BEDROCK_HAIKU_PROFILE_ARN:-}
      SYSTEM_PHONE: ${SYSTEM_PHONE:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-meta-llama/llama-3.1-70b-instruct:free}
      OPENROUTER_FALLBACK_MODEL: ${OPENROUTER_FALLBACK_MODEL:-google/gemma-2-9b-it:free}
      DEPLOY_LISTENER_URL: ${DEPLOY_LISTENER_URL:-http://host.docker.internal:9111}
      DEPLOY_SECRET: ${DEPLOY_SECRET:-fortress-deploy-key}
    ports:
      - "8000:8000"  # Dashboard: http://localhost:8000/dashboard
    volumes:
      - ${STORAGE_PATH:-./storage}:/data/documents:cached
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ollama:
    image: ollama/ollama:latest
    container_name: fortress-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          memory: 6G

  waha:
    image: devlikeapro/waha:arm
    container_name: fortress-waha
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - WHATSAPP_DEFAULT_ENGINE=WEBJS
      - WAHA_DASHBOARD_ENABLED=true
      - WAHA_DASHBOARD_USERNAME=${WAHA_DASHBOARD_USERNAME}
      - WAHA_DASHBOARD_PASSWORD=${WAHA_DASHBOARD_PASSWORD}
      - WAHA_API_KEY=${WAHA_API_KEY}
      - WHATSAPP_RESTART_ALL_SESSIONS=true
      - WHATSAPP_START_SESSION=default
      - WAHA_LOG_LEVEL=info
      - WHATSAPP_API_HOSTNAME=http://fortress-app:8000
      - WHATSAPP_HOOK_URL=http://fortress-app:8000/webhook/whatsapp
      - WHATSAPP_HOOK_EVENTS=message,message.any
      - WHATSAPP_HOOK_HEADERS=X-Api-Key:${WAHA_API_KEY:-}
      - WAHA_DASHBOARD_USERNAME=${WAHA_DASHBOARD_USERNAME:-admin}
      - WAHA_DASHBOARD_PASSWORD=${WAHA_DASHBOARD_PASSWORD:-fortress}
      - WHATSAPP_API_KEY=${WAHA_API_KEY:-}
    volumes:
      - waha_sessions:/app/.sessions

volumes:
  fortress_data:
  waha_sessions:
  ollama_data:
