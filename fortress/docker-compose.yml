services:
  db:
    image: postgres:16-alpine
    container_name: fortress-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fortress
      POSTGRES_USER: fortress
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fortress_dev}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - fortress_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fortress"]
      interval: 10s
      timeout: 5s
      retries: 5

  fortress:
    build: .
    container_name: fortress-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://fortress:${DB_PASSWORD:-fortress_dev}@db:5432/fortress
      STORAGE_PATH: /data/documents
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WAHA_API_URL: http://waha:3000
      WAHA_API_KEY: ${WAHA_API_KEY:-}
      ADMIN_PHONE: ${ADMIN_PHONE:-972542364393}
      OLLAMA_API_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      BEDROCK_API_KEY: ${BEDROCK_API_KEY:-}
      BEDROCK_API_BASE_URL: ${BEDROCK_API_BASE_URL:-https://bedrock.us-east-1.amazonaws.com/v1}
      BEDROCK_MICRO_MODEL: ${BEDROCK_MICRO_MODEL:-amazon.nova-micro-v1:0}
      BEDROCK_LITE_MODEL: ${BEDROCK_LITE_MODEL:-amazon.nova-lite-v1:0}
      BEDROCK_HAIKU_MODEL: ${BEDROCK_HAIKU_MODEL:-us.anthropic.claude-haiku-4-5-20251001-v1:0}
      BEDROCK_SONNET_MODEL: ${BEDROCK_SONNET_MODEL:-us.anthropic.claude-sonnet-4-5-20251001-v1:0}
      BEDROCK_HAIKU_PROFILE_ARN: ${BEDROCK_HAIKU_PROFILE_ARN:-}
      SYSTEM_PHONE: ${SYSTEM_PHONE:-}
      DEPLOY_LISTENER_URL: ${DEPLOY_LISTENER_URL:-http://host.docker.internal:9111}
      DEPLOY_SECRET: ${DEPLOY_SECRET:-fortress-deploy-key}
      # Google Document AI
      GOOGLE_DOCAI_PROJECT_ID: ${GOOGLE_DOCAI_PROJECT_ID:-}
      GOOGLE_DOCAI_LOCATION: ${GOOGLE_DOCAI_LOCATION:-us}
      GOOGLE_DOCAI_PROCESSOR_ID: ${GOOGLE_DOCAI_PROCESSOR_ID:-}
      GOOGLE_DOCAI_FORM_PROCESSOR_ID: ${GOOGLE_DOCAI_FORM_PROCESSOR_ID:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
    ports:
      - "8000:8000"  # Dashboard: http://localhost:8000/dashboard
    volumes:
      - ${STORAGE_PATH:-./storage}:/data/documents:cached
      - ${GOOGLE_CREDENTIALS_PATH:-/dev/null}:/app/google-credentials.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ollama:
    image: ollama/ollama:latest
    container_name: fortress-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          memory: 6G

  waha:
    image: devlikeapro/waha:arm
    container_name: fortress-waha
    restart: "no"
    profiles: ["waha"]
    ports:
      - "3000:3000"
    environment:
      - WHATSAPP_DEFAULT_ENGINE=WEBJS
      - WAHA_DASHBOARD_ENABLED=true
      - WAHA_DASHBOARD_USERNAME=${WAHA_DASHBOARD_USERNAME}
      - WAHA_DASHBOARD_PASSWORD=${WAHA_DASHBOARD_PASSWORD}
      - WAHA_API_KEY=${WAHA_API_KEY}
      - WHATSAPP_RESTART_ALL_SESSIONS=true
      - WHATSAPP_START_SESSION=default
      - WAHA_LOG_LEVEL=info
      - WHATSAPP_API_HOSTNAME=http://fortress-app:8000
      - WHATSAPP_HOOK_URL=http://fortress-app:8000/webhook/whatsapp
      - WHATSAPP_HOOK_EVENTS=message,message.any
      - WHATSAPP_HOOK_HEADERS=X-Api-Key:${WAHA_API_KEY:-}
      - WAHA_DASHBOARD_USERNAME=${WAHA_DASHBOARD_USERNAME:-admin}
      - WAHA_DASHBOARD_PASSWORD=${WAHA_DASHBOARD_PASSWORD:-fortress}
      - WHATSAPP_API_KEY=${WAHA_API_KEY:-}
    volumes:
      - waha_sessions:/app/.sessions

volumes:
  fortress_data:
  waha_sessions:
  ollama_data:
