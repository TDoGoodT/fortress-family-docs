
services:
  postgres:
    image: postgres:16
    container_name: fortress_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fortress
      POSTGRES_USER: fortress
      POSTGRES_PASSWORD: fortress_dev_password
    ports:
      - "5432:5432"
    volumes:
      - fortress_pg_data:/var/lib/postgresql/data

volumes:
  fortress_pg_data:
